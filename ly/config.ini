# ─────────────────────────────────────────────────────────────────────────
#  Rio ly config — black, red, dystopian themed
#  Location: /etc/ly/config.ini
# ─────────────────────────────────────────────────────────────────────────

bg = 0C0C0C
fg = CC0000

# 0 = no animation, 1 = matrix, 2 = binary, 3 = wave, 4 = fill
animation = 3

# Remove the input box frame for a cleaner look
blank_box = true

# Hide password characters
blank_password = true

# Show a clock at the top
clock = %I:%M %p

# Big terminal font — JetBrainsMono loaded from console font path
# This depends on your console fonts; ly uses the TTY font by default
