# ──────────────────────────────────────────────────────────────────────────
#  My rio hyprland config
#  Black, red, dystopian themed
#  vers. 1.0.0
# ──────────────────────────────────────────────────────────────────────────

# ── MONITORS ───────────────────────────────────────────────────────────────
monitor = , preferred, auto, auto

# ── MY PROGRAMS ────────────────────────────────────────────────────────────
$terminal    = alacritty
$fileManager = thunar
$menu        = rofi

# ── AUTOSTART ──────────────────────────────────────────────────────────────

exec-once = ~/.config/hypr/scripts/waybar_watcher.sh &

# EWW SCRIPTS
exec-once = ~/.config/eww/scripts/audio/audio_visualizer.py &
exec-once = cava -p ~/.config/cava/config &

# ROFI image cache
exec-once = cp ~/.config/rofi/image.png /dev/shm/rofi_image.png

# CLIPBOARD - cliphist daemons (stores text and images into clipboard history)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# SYSTEM BACKBONE
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
exec-once = udiskie &
exec-once = hyprctl setcursor mycursor 16


# ── ENVIRONMENT VARIABLES ──────────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GBM_BACKEND,nvidia-drm

env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = XCURSOR_THEME,mycursor
env = HYPRCURSOR_THEME,mycursor
env = XDG_CURRENT_DESKTOP,Hyprland
env = GDK_DPI_SCALE,1
env = XFT_DPI,96
env = XFT_FONT,GohuFont-11

# GTK dark mode (themes Thunar, file-roller, and all GTK apps)
env = GTK_THEME,Adwaita:dark
env = GTK_FONT_NAME,JetBrainsMono Nerd Font 11
# ── LOOK AND FEEL ──────────────────────────────────────────────────────────
general {
    col.active_border   = rgba(d12424ff)   # Red for focused windows
    col.inactive_border = rgba(1e1e1eff)   # Dark grey for inactive
    gaps_in             = 5
    gaps_out            = 20
    border_size         = 2

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

# ── DECORATION ─────────────────────────────────────────────────────────────
decoration {
    rounding       = 1
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 5
        render_power = 4
        color        = rgba(000000aa)
    }

    blur {
        size        = 2
        passes      = 1
        brightness  = 0.4
    }
}

# ── ANIMATIONS ─────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1
    animation = layersIn, 1, 4, emphasizedDecel, slide
    animation = layersOut, 1, 3, emphasizedAccel, slide
    animation = fadeLayers, 1, 4, standard
    animation = windowsIn, 1, 4, emphasizedDecel
    animation = windowsOut, 1, 3, emphasizedAccel
    animation = windowsMove, 1, 5, standard
    animation = workspaces, 1, 4, standard
    animation = specialWorkspace, 1, 3, specialWorkSwitch, slidefadevert 14%
    animation = fade, 1, 5, standard
    animation = fadeDim, 1, 5, standard
    animation = border, 1, 5, standard
}

# ── LAYOUTS ────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

# ── INPUT ──────────────────────────────────────────────────────────────────
input {
    kb_layout = tr
    kb_variant =
    kb_model =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
        disable_while_typing = false
    }
}

gestures {
    workspace_swipe = false
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

# ── KEYBINDINGS ────────────────────────────────────────────────────────────
$mainMod = SUPER

# Apps
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, V, centerwindow,
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -p '󰅇 Clipboard' | cliphist decode | wl-copy
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Swap windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshotting
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim - | swappy -f -

# Monitor / Extras
bind = , XF86Display,       exec, hyprctl dispatch cyclenextmonitor
bind = , XF86Launch1,       exec, ~/.config/hyprlock/lock.sh

# Multimedia keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,  exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# shortcut (ğ and ü) cuz this fuckass system doesnt detect volume up down specifically
bind = $mainMod, gbreve, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, udiaeresis, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous



# ── WINDOWS AND WORKSPACES ────────────────────────────────────────────────
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrulev2 = nofocus, class:^(eww)$

# Cava Desktop Widget Rules
windowrulev2 = float, class:^(cava)$
windowrulev2 = pin, class:^(cava)$
windowrulev2 = nofocus, class:^(cava)$
windowrulev2 = noborder, class:^(cava)$
windowrulev2 = noshadow, class:^(cava)$
windowrulev2 = noanim, class:^(cava)$
windowrulev2 = size 800 250, class:^(cava)$
windowrulev2 = center, class:^(cava)$

workspace=1,persistent:true
workspace=2,persistent:true
workspace=3,persistent:true
workspace=4,persistent:true
workspace=5,persistent:true
workspace=6,persistent:true
workspace=7,persistent:true
workspace=8,persistent:true
workspace=9,persistent:true
workspace=10,persistent:true
