[Autologin]
# Set to your username to skip the login screen entirely (NOT recommended)
# User=esef

[General]
# The theme to use. Must match the folder name in /usr/share/sddm/themes/
InputMethod=
Numlock=on

[Theme]
# Point SDDM at our custom Rio theme
Current=rio

[X11]
# Not needed on pure Wayland, but harmless to leave
ServerArguments=-nolisten tcp

[Wayland]
CompositorCommand=Hyprland
