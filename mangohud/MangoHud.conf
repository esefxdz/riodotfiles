##############################################################################
#  MangoHud Config
#  Black, red, dystopian themed — matches Rio dotfiles palette
#  Location: ~/.config/MangoHud/MangoHud.conf
#  vers. 1.0.0
##############################################################################


# ── Position & Size ──────────────────────────────────────────────────────────
position=top-left
width=260
table_columns=3
font_size=20
font_size_text=14

# ── What to display ──────────────────────────────────────────────────────────
fps
frametime
frame_timing=1
cpu_stats
cpu_temp
gpu_stats
gpu_temp
gpu_power
gpu_core_clock
gpu_mem_clock
ram
vram

# ── Colors (hex, no #) ───────────────────────────────────────────────────────
#  background          = #121212 near-black
#  text                = #cccccc light grey
#  gpu_color           = #ff2a2a Rio Red (bright)
#  cpu_color           = #d12424 Rio Red (dark)
#  fps_color_above     = #ffffff white  (good fps)
#  fps_color_med       = #ff2a2a red    (mid fps)
#  fps_color_low       = #d12424 dark red (bad fps)
#  frametime_color     = #888888 muted grey
#  engine_color        = #ff2a2a

background_color=121212
alpha=0.85
text_color=cccccc
gpu_color=ff2a2a
cpu_color=d12424
fps_color_above=ffffff
fps_color_med=ff2a2a
fps_color_low=d12424
frametime_color=888888
engine_color=ff2a2a
wine_color=ff2a2a
battery_color=d12424
io_color=cccccc
network_color=ff2a2a

# ── FPS thresholds for color change ──────────────────────────────────────────
fps_limit_method=late
fps_color=80,144            # below 80 = red, 80-144 = med, above = white

# ── Frame timing graph ───────────────────────────────────────────────────────
frame_timing=1
frametime_color=888888

# ── Misc ─────────────────────────────────────────────────────────────────────
toggle_hud=Shift_R+F12      # SHIFT+F12 to toggle the overlay
toggle_fps_limit=Shift_R+F1
no_display=0


##############################################################################
#  ── POST-INSTALL SETUP (Manual Steps) ─────────────────────────────────────
#
#  1. INSTALL:
#       sudo pacman -S mangohud
#       (or with AUR helper: yay -S mangohud, however i dont recommend aur lmao)
#
#  2. DEPLOY THIS CONFIG:
#       mkdir -p ~/.config/MangoHud
#       cp ~/dotfiles/mangohud/MangoHud.conf ~/.config/MangoHud/MangoHud.conf
#
#  3. STEAM GAMES:
#       - Open Steam → right-click a game → Properties → Launch Options
#       - Add: mangohud %command%
#       - That's it. The overlay will appear in-game.
#
#  4. NON-STEAM / NATIVE APPS:
#       - Prefix any command with mangohud:
#         mangohud <app>
#       - Example: mangohud lutris
#
#  5. TOGGLE IN-GAME:
#       - Press Shift_R + F12 to show/hide the HUD at any time.
#       - Press Shift_R + F1 to toggle FPS limit (if configured).
#
#  NOTE: MangoHud runs passively — no autostart or hyprland.conf entry needed.
#        It only activates when a game/app is launched with the mangohud prefix.
##############################################################################
