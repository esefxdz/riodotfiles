[Settings]
# ──────────────────────────────────────────────────────────────────────────
#  GTK 3.0 Settings — Rio theme
#  Location: ~/.config/gtk-3.0/settings.ini
#  Applies to: Thunar, file-roller, and any GTK3 app
# ──────────────────────────────────────────────────────────────────────────

# Dark mode
gtk-application-prefer-dark-theme=1
gtk-theme-name=Adwaita-dark

# Icons — install papirus-icon-theme for best result (sudo pacman -S papirus-icon-theme)
# then set: gtk-icon-theme-name=Papirus-Dark
gtk-icon-theme-name=Papirus-Dark

# Font — matches Rio dotfiles font stack
gtk-font-name=JetBrainsMono Nerd Font 13

# Cursor
gtk-cursor-theme-name=mycursor
gtk-cursor-theme-size=16

# Misc tweaks
gtk-button-images=0
gtk-menu-images=0
gtk-enable-event-sounds=0
gtk-enable-input-feedback-sounds=0
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
gtk-decoration-layout=menu:close
